       مثال:
       window.PORSIT_API = "https://porsit-api.onrender.com";
    ─────────────────────────────────────────────────────────────── */
    window.PORSIT_API = "https://porsit-api.onrender.com";

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

e-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 3h6l-1 7 3 3H7l3-3z\"><\u002Fpath><path d=\"M12 16v5\"><\u002Fpath><\u002Fsvg><\u002Fspan>سنجاق به داشبورد<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ historyOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"pa-scrim\" sc-camel-on-click=\"{{ closeHistory }}\"><\u002Fdiv>\n    <div class=\"pa-sheet\">\n      <div class=\"pa-grab\"><\u002Fdiv>\n      <div class=\"pa-sheet-t\">گفت‌وگوها<\u002Fdiv>\n      <button class=\"pa-hnew\" sc-camel-on-click=\"{{ newChat }}\"><svg width=\"17\" height=\"17\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 5v14\"><\u002Fpath><path d=\"M5 12h14\"><\u002Fpath><\u002Fsvg>گفت‌وگوی جدید<\u002Fbutton>\n      {{ historyListNode }}\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ onboard }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"pa-onb\">\n      <div class=\"pa-onb-card\">\n        <div class=\"pa-onb-mark\"><svg width=\"24\" height=\"24\" sc-camel-view-box=\"0 0 24 24\" fill=\"#fff\"><path d=\"M12 2l2 6.5L20.5 11 14 13l-2 6.5L10 13 3.5 11 10 8.5z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"pa-onb-h\">به دستیار دادهٔ پُرسیت خوش آمدی<\u002Fdiv>\n        <div class=\"pa-onb-b\">\n          <div class=\"pa-onb-row\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"3\" width=\"6\" height=\"11\" rx=\"3\"><\u002Frect><path d=\"M6 11a6 6 0 0 0 12 0\"><\u002Fpath><path d=\"M12 17v4\"><\u002Fpath><\u002Fsvg><div>سؤالت را دربارهٔ دادهٔ لجستیک <b>بپرس یا بگو<\u002Fb>، به زبان خودت.<\u002Fdiv><\u002Fdiv>\n          <div class=\"pa-onb-row\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 17l6-6 4 4 7-7\"><\u002Fpath><path d=\"M17 8h4v4\"><\u002Fpath><\u002Fsvg><div>جواب را با <b>نمودار و تحلیل<\u002Fb> می‌گیری.<\u002Fdiv><\u002Fdiv>\n          <div class=\"pa-onb-row\"><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3a6 6 0 0 0-4 10.5c.6.6 1 1.4 1 2.5h6c0-1.1.4-1.9 1-2.5A6 6 0 0 0 12 3z\"><\u002Fpath><path d=\"M9 21h6\"><\u002Fpath><\u002Fsvg><div>با «<b>چرا؟<\u002Fb>» و «<b>پیش‌بینی<\u002Fb>» عمیق‌تر شو و پاسخ‌ها را <b>سنجاق<\u002Fb> کن.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"pa-onb-btn\" sc-camel-on-click=\"{{ finishOnboard }}\">بزن بریم<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ toast }}\" hint-placeholder-val=\"{{ false }}\"><div class=\"pa-toast\">{{ toastText }}<\u002Fdiv><\u002Fsc-if>\n\n  <sc-if value=\"{{ showAuth }}\" hint-placeholder-val=\"{{ false }}\">\n    <div class=\"pa-auth\" dir=\"rtl\">\n      <div class=\"pa-auth-brand\">\n        <div class=\"pa-auth-mark\"><svg width=\"28\" height=\"28\" sc-camel-view-box=\"0 0 24 24\" fill=\"#fff\"><path d=\"M12 2l2 6.5L20.5 11 14 13l-2 6.5L10 13 3.5 11 10 8.5z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n        <div class=\"pa-auth-t\">{{ authTitle }}<\u002Fdiv>\n        <div class=\"pa-auth-s\">دستیار دادهٔ لجستیک پُرسیت<\u002Fdiv>\n      <\u002Fdiv>\n      <sc-if value=\"{{ isRegister }}\" hint-placeholder-val=\"{{ false }}\">\n        <div class=\"pa-field\"><label>نام<\u002Flabel><input value=\"{{ authName }}\" sc-camel-on-input=\"{{ onAuthName }}\" placeholder=\"نام و نام خانوادگی\" dir=\"rtl\"><\u002Fdiv>\n      <\u002Fsc-if>\n      <div class=\"pa-field\"><label>ایمیل<\u002Flabel><input value=\"{{ authEmail }}\" sc-camel-on-input=\"{{ onAuthEmail }}\" placeholder=\"you@porsit.ir\" dir=\"ltr\" type=\"email\"><\u002Fdiv>\n      <div class=\"pa-field\"><label>رمز عبور<\u002Flabel><input value=\"{{ authPass }}\" sc-camel-on-input=\"{{ onAuthPass }}\" sc-camel-on-key-down=\"{{ onAuthKey }}\" placeholder=\"••••••••\" dir=\"ltr\" type=\"password\"><\u002Fdiv>\n      <div class=\"pa-auth-err\">{{ authError }}<\u002Fdiv>\n      <button class=\"pa-onb-btn\" style=\"margin-top:0\" sc-camel-on-click=\"{{ submitAuth }}\">{{ authCta }}<\u002Fbutton>\n      <div class=\"pa-auth-alt\">{{ authAltText }} <button sc-camel-on-click=\"{{ toggleAuthMode }}\">{{ authAltCta }}<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ booting }}\" hint-placeholder-val=\"{{ true }}\">\n    <div class=\"pa-boot\">\n      <div class=\"pa-spin\"><\u002Fdiv>\n      <div class=\"bt\">در حال آماده‌سازی داده‌های لجستیک<\u002Fdiv>\n      <div class=\"bs\">ساخت پایگاه‌دادهٔ SQLite و ۵۰٬۰۰۰ مرسولهٔ بین‌شهری… چند لحظه<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:880},&quot;showSql&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;رفتار&quot;},&quot;voiceEnabled&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;رفتار&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props){\n    super(props);\n    let theme='light', pinned=[], onboard=true, user=null, users=null;\n    try{ theme=localStorage.getItem('porsit_theme')||'light'; }catch(e){}\n    try{ pinned=JSON.parse(localStorage.getItem('porsit_pins')||'[]'); }catch(e){}\n    try{ onboard=!localStorage.getItem('porsit_onboard'); }catch(e){}\n    try{ user=JSON.parse(localStorage.getItem('porsit_user')||'null'); }catch(e){}\n    try{ users=JSON.parse(localStorage.getItem('porsit_users')||'null'); }catch(e){}\n    let conversations=[], currentId=null;\n    try{ conversations=JSON.parse(localStorage.getItem('porsit_convs')||'[]'); }catch(e){}\n    try{ currentId=localStorage.getItem('porsit_curconv')||null; }catch(e){}\n    let msgs=[]; const cur=conversations.find(c=>c.id===currentId); if(cur){ msgs=cur.messages||[]; this.apiHistory=cur.apiHistory||[]; }\n    this.state = { messages: msgs, input: '', booting: true, busy: false, recording: false, rowCount: 0, view:'chat', theme, pinned, onboard, pending:null, shareData:null, toast:null, speaking:null, net:null,\n      user, users, authMode:'login', authName:'', authEmail:'', authPass:'', authError:'', inviteEmail:'',\n      conversations, currentId, historyOpen:false };\n    this.msgRef = React.createRef();\n    this._sqls = []; if(!this.apiHistory) this.apiHistory = [];\n    this.CITY = [\n      ['تهران','تهران',35.69,51.39,35],['مشهد','خراسان رضوی',36.30,59.61,12],\n      ['اصفهان','اصفهان',32.65,51.67,9],['شیراز','فارس',29.59,52.58,7],\n      ['تبریز','آذربایجان شرقی',38.08,46.29,6],['کرج','البرز',35.84,50.94,5],\n      ['اهواز','خوزستان',31.32,48.67,5],['قم','قم',34.64,50.88,4],\n      ['رشت','گیلان',37.28,49.58,3],['کرمانشاه','کرمانشاه',34.31,47.06,3],\n      ['یزد','یزد',31.90,54.37,2.5],['بندرعباس','هرمزگان',27.18,56.28,2.5],\n      ['کرمان','کرمان',30.28,57.08,2],['زاهدان','سیستان و بلوچستان',29.50,60.86,2],\n      ['ارومیه','آذربایجان غربی',37.55,45.07,2],['ساری','مازندران',36.57,53.06,2],\n      ['اراک','مرکزی',34.09,49.70,1.5],['همدان','همدان',34.80,48.52,1.5]\n    ];\n    this.JMONTH = ['فروردین','اردیبهشت','خرداد','تیر','مرداد','شهریور','مهر','آبان','آذر','دی','بهمن','اسفند'];\n  }\n\n  componentDidMount(){ this.buildDb(); }\n  componentDidUpdate(){ if(this.state.view!=='chat') return; const el = this.msgRef && this.msgRef.current; if(el) el.scrollTop = el.scrollHeight; }\n\n  // ---------- helpers ----------\n  mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }\n  gauss(r,m,s){ let u=0,v=0; while(u===0)u=r(); while(v===0)v=r(); return m+s*Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v); }\n  hav(a,b,c,d){ const R=6371,tr=Math.PI/180; const dLa=(c-a)*tr,dLo=(d-b)*tr; const x=Math.sin(dLa/2)**2+Math.cos(a*tr)*Math.cos(c*tr)*Math.sin(dLo/2)**2; return Math.round(R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))); }\n  wpick(r,items,weights){ let t=weights.reduce((a,b)=>a+b,0),x=r()*t; for(let i=0;i<items.length;i++){ x-=weights[i]; if(x<=0) return items[i]; } return items[items.length-1]; }\n  toJalaali(gy,gm,gd){ const g=[0,31,59,90,120,151,181,212,243,273,304,334]; let gy2=gm>2?gy+1:gy; let days=355666+365*gy+Math.floor((gy2+3)/4)-Math.floor((gy2+99)/100)+Math.floor((gy2+399)/400)+gd+g[gm-1]; let jy=-1595+33*Math.floor(days/12053); days%=12053; jy+=4*Math.floor(days/1461); days%=1461; if(days>365){ jy+=Math.floor((days-1)/365); days=(days-1)%365; } let jm,jd; if(days<186){ jm=1+Math.floor(days/31); jd=1+days%31; } else { jm=7+Math.floor((days-186)/30); jd=1+(days-186)%30; } return [jy,jm,jd]; }\n  fa(n){ try{ return Number(n).toLocaleString('fa-IR'); }catch(e){ return String(n); } }\n  fmtv(v){ const s=String(v==null?'':v); const conv=t=>{ const latin=t.replace(/[۰-۹]/g,ch=>String('۰۱۲۳۴۵۶۷۸۹'.indexOf(ch))); const num=Number(latin); return isFinite(num)?num.toLocaleString('fa-IR'):t; }; try{ return s.replace(/[0-9۰-۹]+(?:[.][0-9۰-۹]+)?/g,conv); }catch(e){ return s; } }\n\n  async buildDb(){\n    try{\n      let tries=0; while(!window.initSqlJs && tries<200){ await new Promise(r=>setTimeout(r,50)); tries++; }\n      const SQL = await window.initSqlJs({ locateFile: f => 'https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/'+f });\n      const db = new SQL.Database();\n      db.run(`CREATE TABLE cities(id INTEGER PRIMARY KEY,name TEXT,province TEXT,lat REAL,lng REAL);\n        CREATE TABLE routes(id INTEGER PRIMARY KEY,origin_id INT,dest_id INT,distance_km INT,sla_hours INT);\n        CREATE TABLE hubs(id INTEGER PRIMARY KEY,name TEXT,city_id INT);\n        CREATE TABLE couriers(id INTEGER PRIMARY KEY,name TEXT,vehicle_type TEXT,hub_id INT);\n        CREATE TABLE shipments(id INTEGER PRIMARY KEY,tracking_code TEXT,created_date TEXT,j_year INT,j_month INT,j_month_name TEXT,origin_id INT,dest_id INT,route_id INT,hub_id INT,courier_id INT,weight_kg REAL,cost_toman INT,service_type TEXT,status TEXT,promised_hours INT,actual_hours INT,is_delayed INT,is_delivered INT);\n        CREATE TABLE complaints(id INTEGER PRIMARY KEY,shipment_id INT,category TEXT,created_date TEXT,is_resolved INT);\n        CREATE TABLE returns(id INTEGER PRIMARY KEY,shipment_id INT,reason TEXT,created_date TEXT);`);\n\n      const r = this.mulberry32(987654321);\n      const C = this.CITY;\n      let s = db.prepare('INSERT INTO cities VALUES (?,?,?,?,?)');\n      C.forEach((c,i)=>s.run([i+1,c[0],c[1],c[2],c[3]])); s.free();\n      s = db.prepare('INSERT INTO hubs VALUES (?,?,?)');\n      C.forEach((c,i)=>s.run([i+1,'هاب '+c[0],i+1])); s.free();\n      const fn=['علی','رضا','محمد','حسین','مهدی','امیر','سعید','جواد','بهرام','کاوه','فرهاد','یاسر','نیما','پیمان','حامد','مجید'];\n      const ln=['محمدی','رضایی','کریمی','موسوی','حسینی','اکبری','نوری','قاسمی','صادقی','رستمی','بابایی','عباسی'];\n      const veh=['موتور','وانت','کامیون']; const vehW=[0.2,0.55,0.25];\n      const couriersByHub={}; let cid=0; const courierQ={};\n      s = db.prepare('INSERT INTO couriers VALUES (?,?,?,?)');\n      for(let h=1;h<=C.length;h++){ couriersByHub[h]=[]; const n=8+Math.floor(r()*8); for(let k=0;k<n;k++){ cid++; const v=this.wpick(r,veh,vehW); s.run([cid,fn[Math.floor(r()*fn.length)]+' '+ln[Math.floor(r()*ln.length)],v,h]); couriersByHub[h].push(cid); courierQ[cid]=Math.max(0,this.gauss(r,0.05,0.14))+(r()<0.12?0.28:0); } }\n      s.free();\n      const routeId={}; let rid=0; s=db.prepare('INSERT INTO routes VALUES (?,?,?,?,?)');\n      const routeStress={};\n      for(let o=1;o<=C.length;o++) for(let d=1;d<=C.length;d++){ if(o===d) continue; rid++; routeId[o*100+d]=rid; const dist=this.hav(C[o-1][2],C[o-1][3],C[d-1][2],C[d-1][3]); let sla=dist<300?24:dist<700?40:dist<1200?56:80; s.run([rid,o,d,dist,sla]); let st=(this.mulberry32(o*997+d*131)()*0.4); const on=C[o-1][0],dn=C[d-1][0]; if((on==='تهران'&&(dn==='زاهدان'||dn==='بندرعباس'||dn==='کرمان'))||on==='زاهدان'||dn==='زاهدان') st+=0.3; routeStress[rid]=st; }\n      s.free();\n      const routeSla={}; { const rs=db.exec('SELECT id,sla_hours FROM routes')[0]; rs.values.forEach(v=>routeSla[v[0]]=v[1]); }\n\n      const N=50000; const svc=['عادی','اکسپرس','ویژه'], svcW=[0.62,0.30,0.08];\n      const svcT={'عادی':1.0,'اکسپرس':0.55,'ویژه':0.75}, svcC={'عادی':1.0,'اکسپرس':1.7,'ویژه':2.4};\n      const cityW=C.map(c=>c[4]);\n      const end=new Date(2026,6,13).getTime(); const DAY=86400000;\n      db.run('BEGIN TRANSACTION');\n      const sh=db.prepare('INSERT INTO shipments VALUES (?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?,?)');\n      const cp=db.prepare('INSERT INTO complaints VALUES (?,?,?,?,?)');\n      const rt=db.prepare('INSERT INTO returns VALUES (?,?,?,?)');\n      let compId=0, retId=0, minK=99999, maxK=0, minName='', maxName='';\n      const cpCat=['آسیب','گم‌شدن','برخورد نامناسب','هزینه','تأخیر']; const cpCatW=[0.28,0.14,0.24,0.2,0.14];\n      const retR=['آدرس اشتباه','عدم حضور مشتری','آسیب کالا','انصراف مشتری']; const retW=[0.3,0.3,0.2,0.2];\n      for(let i=1;i<=N;i++){\n        const off=Math.floor(400*(1-Math.pow(r(),1.6)));\n        const dt=new Date(end-off*DAY); const gy=dt.getFullYear(),gm=dt.getMonth()+1,gd=dt.getDate();\n        const iso=gy+'-'+String(gm).padStart(2,'0')+'-'+String(gd).padStart(2,'0');\n        const [jy,jm]=this.toJalaali(gy,gm,gd); const jn=this.JMONTH[jm-1]; const k=jy*12+jm;\n        if(k<minK){minK=k;minName=jn+' '+jy;} if(k>maxK){maxK=k;maxName=jn+' '+jy;}\n        let o=C.indexOf(this.wpick(r,C,cityW))+1; let d; do{ d=C.indexOf(this.wpick(r,C,cityW))+1; }while(d===o);\n        const route=routeId[o*100+d]; const service=this.wpick(r,svc,svcW);\n        const base=routeSla[route]; const promised=Math.max(6,Math.round(base*svcT[service]));\n        const dist=this.hav(C[o-1][2],C[o-1][3],C[d-1][2],C[d-1][3]);\n        const weight=Math.round((0.5+Math.pow(r(),3)*29)*10)/10;\n        const cost=Math.round((25000+dist*300+weight*3500)*svcC[service]/1000)*1000;\n        const hub=o; const cour=couriersByHub[hub][Math.floor(r()*couriersByHub[hub].length)];\n        let status,delivered=0,actual=null,delayed=0;\n        if(off<=6){ status=this.wpick(r,['در حال ارسال','در هاب','تحویل‌شده'],[0.45,0.2,0.35]); }\n        else { const rr=r(); status = rr<0.035?'مرجوع‌شده': rr<0.05?'لغو‌شده':'تحویل‌شده'; }\n        if(status==='تحویل‌شده'){ delivered=1; const seas=(jm>=10?0.18:jm===9?0.08:0); let mean=0.82+routeStress[route]+courierQ[cour]+seas; if(service==='اکسپرس') mean*=0.9; let f=this.gauss(r,mean,0.22); f=Math.max(0.45,Math.min(3.2,f)); actual=Math.max(2,Math.round(promised*f)); delayed=actual>promised?1:0; }\n        sh.run([i,'PS'+String(100000+i),iso,jy,jm,jn,o,d,route,hub,cour,weight,cost,service,status,promised,actual,delayed,delivered]);\n        let p=0.025+(delayed?0.20:0)+(status==='مرجوع‌شده'?0.35:0)+(status==='لغو‌شده'?0.12:0);\n        if(r()<p){ compId++; let cat = delayed ? (r()<0.8?'تأخیر':this.wpick(r,['برخورد نامناسب','هزینه'],[0.5,0.5])) : this.wpick(r,cpCat,cpCatW); const cdt=new Date(dt.getTime()+Math.floor(r()*4+1)*DAY); const ciso=cdt.getFullYear()+'-'+String(cdt.getMonth()+1).padStart(2,'0')+'-'+String(cdt.getDate()).padStart(2,'0'); cp.run([compId,i,cat,ciso,r()<0.68?1:0]); }\n        if(status==='مرجوع‌شده'){ retId++; rt.run([retId,i,this.wpick(r,retR,retW),iso]); }\n      }\n      sh.free(); cp.free(); rt.free();\n      db.run('COMMIT');\n      db.run('CREATE INDEX ix1 ON shipments(created_date);CREATE INDEX ix2 ON shipments(origin_id,dest_id);CREATE INDEX ix3 ON shipments(route_id);CREATE INDEX ix4 ON shipments(status);CREATE INDEX ix5 ON shipments(service_type);CREATE INDEX ix6 ON shipments(courier_id);CREATE INDEX ix7 ON shipments(j_year,j_month);CREATE INDEX ix8 ON complaints(shipment_id);');\n      this.db = db; this.minName=minName; this.maxName=maxName;\n      this.setState({ booting:false, rowCount:N });\n    }catch(e){ console.error(e); this.setState({ booting:false }); this._dbError=String(e&&e.message||e); }\n  }\n\n  runSqlForAI(sql){\n    if(!/^\\s*select/i.test(sql) || /;\\s*\\S/.test(sql.trim().replace(/;\\s*$/,''))) return JSON.stringify({error:'فقط یک کوئری SELECT مجاز است'});\n    try{ this._sqls.push(sql); const res=this.db.exec(sql); if(!res.length) return JSON.stringify({columns:[],rows:[]}); const {columns,values}=res[0]; const rows=values.slice(0,100).map(v=>{const o={};columns.forEach((c,i)=>o[c]=v[i]);return o;}); return JSON.stringify({columns,rows}); }\n    catch(e){ return JSON.stringify({error:String(e&&e.message||e)}); }\n  }\n\n  systemPrompt(){\n    return `تو تحلیل‌گر دادهٔ ابزار «پُرسیت» برای یک شرکت لجستیک بین‌شهری (مثل تیپاکس) هستی. یک پایگاه‌دادهٔ SQLite در دسترس داری. برای هر پاسخ حتماً از ابزار run_sql استفاده کن (فقط SELECT) و بر اساس نتیجهٔ واقعی جواب بده.\n\nاسکیمای دیتابیس:\n- cities(id, name, province, lat, lng)\n- routes(id, origin_id→cities.id, dest_id→cities.id, distance_km, sla_hours)\n- hubs(id, name, city_id)\n- couriers(id, name, vehicle_type ['موتور','وانت','کامیون'], hub_id→hubs.id)\n- shipments(id, tracking_code, created_date TEXT 'YYYY-MM-DD', j_year, j_month 1..12, j_month_name فارسی, origin_id, dest_id, route_id, hub_id, courier_id, weight_kg, cost_toman, service_type ['عادی','اکسپرس','ویژه'], status ['تحویل‌شده','در حال ارسال','در هاب','مرجوع‌شده','لغو‌شده'], promised_hours, actual_hours, is_delayed 0/1, is_delivered 0/1)\n- complaints(id, shipment_id, category ['تأخیر','آسیب','گم‌شدن','برخورد نامناسب','هزینه'], created_date, is_resolved 0/1)\n- returns(id, shipment_id, reason, created_date)\n\nنکات:\n- نام شهرها در cities است؛ برای نام مبدأ/مقصد JOIN بزن.\n- تأخیر و SLA فقط برای تحویل‌شده‌ها (is_delivered=1)؛ نرخ تأخیر = AVG(is_delayed).\n- برای «مسیر» مبدأ+مقصد را گروه‌بندی کن.\n- بازهٔ داده از ${this.minName} تا ${this.maxName}. «اخیر» یعنی چند ماه آخر. برای روند بر اساس (j_year,j_month) مرتب کن و برچسب = j_month_name.\n- هزینه به تومان.\n\nحافظهٔ گفت‌وگو: به پیام‌های قبلی توجه کن. اگر کاربر گفت «همون برای اصفهان» یا «چرا؟» منظورش ادامهٔ همان تحلیل قبلی است.\nمقایسه: هرجا معنادار است مقدار را با دورهٔ قبل یا میانگین مقایسه کن و kpi.delta و kpi.dir ('up'|'down') و kpi.sentiment ('good'|'bad'|'neutral' از دید کسب‌وکار: مثلاً تأخیر بالاتر=bad، تحویلِ به‌موقعِ بالاتر=good) را پر کن.\n«چرا؟»: چند کوئری پشت‌سرهم بزن (تفکیک بر اساس مسیر، ماه، راننده، نوع سرویس، فصل...) و علتِ ریشه‌ای را در summary توضیح بده.\nپیش‌بینی: اگر خواستند، نقاط ماه‌های آینده را به labels/values اضافه کن و chart.predicted را برابر تعداد نقاط پیش‌بینی‌شده بگذار.\nاگر سؤال مبهم یا خارج از دادهٔ موجود است، به‌جای حدس، فقط این را بده: {\"clarify\":\"یک سؤال کوتاه روشن‌کننده\",\"options\":[\"گزینه ۱\",\"گزینه ۲\",\"گزینه ۳\"]}\n\nدر غیر این صورت پاسخ نهایی را «فقط و فقط» یک شیء JSON بده (بدون متن اضافه، بدون بک‌تیک/markdown):\n{\"headline\":\"جملهٔ کوتاه نتیجه\",\"kpi\":{\"value\":\"مثلاً ۸۴٪\",\"delta\":\"۵٪ یا null\",\"dir\":\"up|down|null\",\"sentiment\":\"good|bad|neutral\"}|null,\"stats\":[{\"label\":\"...\",\"value\":\"...\",\"delta\":\"...\",\"dir\":\"up|down|null\",\"sentiment\":\"good|bad|neutral\"}]|null,\"chart\":{\"type\":\"bar|hbar|line\",\"labels\":[\"...\"],\"values\":[عدد...],\"unit\":\"...\",\"predicted\":0}|null,\"table\":{\"columns\":[\"...\"],\"rows\":[[\"...\"]]}|null,\"summary\":\"۱ تا ۲ جملهٔ تحلیلی\",\"followups\":[\"سؤال ۱\",\"سؤال ۲\",\"سؤال ۳\"]}\n\nقواعد نمودار: رتبه‌بندی→hbar، روند زمانی→line یا bar با برچسب ماه، تک‌عدد→kpi، چند شاخصِ خلاصه→stats. حداکثر ۱۲ نقطه و ۸ سطر. values عددِ خام. همهٔ متن‌ها فارسی.`;\n  }\n\n  parseAnswer(text){\n    let t=(text||'').trim();\n    const a=t.indexOf('{'), b=t.lastIndexOf('}');\n    if(a>=0&&b>a){ try{ const o=JSON.parse(t.slice(a,b+1)); return this.normalize(o); }catch(e){} }\n    return { headline:'', summary:t||'پاسخی دریافت نشد.', followups:[] };\n  }\n  normalize(o){\n    const nn=v=>{ const s=v==null?'':String(v).trim(); return /^(null|undefined|none|nan|-)$/i.test(s)?'':s; };\n    if(o.clarify){ return { clarify:String(o.clarify), options:Array.isArray(o.options)?o.options.map(String).slice(0,4):[], followups:[] }; }\n    const num=x=>{const n=Number(String(x).replace(/[^\\d.\\-]/g,''));return isFinite(n)?n:0;};\n    let chart=null;\n    if(o.chart&&o.chart.type&&Array.isArray(o.chart.labels)&&Array.isArray(o.chart.values)&&o.chart.values.length){\n      const vals=o.chart.values.slice(0,12).map(num);\n      chart={ type:o.chart.type, unit:o.chart.unit||'', labels:o.chart.labels.map(String).slice(0,12), values:vals, predicted:Math.max(0,Math.min(vals.length-1,parseInt(o.chart.predicted||0)||0)) };\n    }\n    let table=null;\n    if(o.table&&Array.isArray(o.table.columns)&&Array.isArray(o.table.rows)){\n      table={ columns:o.table.columns.map(String), rows:o.table.rows.slice(0,8).map(row=>row.map(c=>nn(c))) };\n    }\n    const kpi=o.kpi&&nn(o.kpi.value)?{value:nn(o.kpi.value),delta:nn(o.kpi.delta),dir:nn(o.kpi.dir)||null,sentiment:nn(o.kpi.sentiment)||null}:null;\n    const stats=Array.isArray(o.stats)?o.stats.slice(0,4).map(x=>({label:nn(x.label),value:nn(x.value),delta:nn(x.delta),dir:nn(x.dir)||null,sentiment:nn(x.sentiment)||null})):null;\n    return { headline:o.headline?String(o.headline):'', kpi, stats, chart, table, summary:o.summary?String(o.summary):'', followups:Array.isArray(o.followups)?o.followups.map(String).slice(0,3):[] };\n  }\n\n  apiBase(){ try{ return window.PORSIT_API || localStorage.getItem('porsit_api') || ''; }catch(e){ return window.PORSIT_API || ''; } }\n  async ask(q){\n    const api=this.apiBase();\n    if(!api && !this.db){ this.replaceThinking({role:'error',text:'پا
